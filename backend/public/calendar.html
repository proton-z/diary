<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日历 · 本地任务看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/ui.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
      /* calendar theme (clean + hackmd-ish squarer corners) */
      .fc {
        --fc-border-color: var(--border-2);
        --fc-page-bg-color: transparent;
        --fc-neutral-bg-color: transparent;
        --fc-today-bg-color: var(--primary-2);
        --fc-event-bg-color: var(--primary-2);
        --fc-event-border-color: rgba(14,165,233,.25);
        --fc-event-text-color: #075985;
        --fc-button-bg-color: var(--accent);
        --fc-button-border-color: var(--border-2);
        --fc-button-text-color: var(--fg);
        --fc-button-hover-bg-color: var(--accent-2);
        --fc-button-hover-border-color: var(--border-2);
        --fc-button-active-bg-color: var(--accent-2);
        --fc-button-active-border-color: var(--border-2);
      }
      .fc .fc-button {
        border-radius: var(--radius-sm);
        box-shadow: none;
      }
      .fc .fc-toolbar-title {
        font-size: 18px;
        font-weight: 750;
        color: var(--fg);
        letter-spacing: -0.01em;
      }
      /* toolbar layout + modern segmented-ish buttons */
      .fc .fc-header-toolbar {
        margin-bottom: 10px;
      }
      .fc .fc-toolbar-chunk:first-child {
        display:flex;
        align-items:center;
      }
      .fc .fc-toolbar-chunk:last-child {
        display:flex;
        align-items:center;
        gap: 10px;
      }
      .fc .fc-button-group {
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(15,23,42,.06);
        background: rgba(2,6,23,.03);
      }
      .fc .fc-button-group .fc-button {
        border: none;
        background: transparent;
        height: 32px;
        padding: 0 10px;
        color: rgba(15,23,42,.86);
      }
      .fc .fc-button-group .fc-button:hover {
        background: rgba(2,6,23,.06);
      }
      .fc .fc-button-group .fc-button:focus {
        box-shadow: none;
      }
      .fc .fc-button-primary:not(:disabled).fc-button-active,
      .fc .fc-button-primary:not(:disabled):active {
        background: rgba(2,6,23,.07);
        color: rgba(15,23,42,.92);
      }
      .fc .fc-daygrid-event {
        border-radius: 8px;
      }
      .fc .fc-daygrid-event.is-done {
        --fc-event-bg-color: rgba(2,6,23,.04);
        --fc-event-border-color: rgba(2,6,23,.10);
        --fc-event-text-color: var(--muted);
      }
      .fc .fc-daygrid-event.is-open {
        --fc-event-bg-color: var(--primary-2);
        --fc-event-border-color: rgba(14,165,233,.25);
        --fc-event-text-color: #075985;
      }
      .fc .fc-scrollgrid {
        border-radius: var(--radius);
        overflow: hidden;
      }
      .fc a {
        color: inherit;
      }
      /* grid lines：水平线轻微、隐藏大部分竖线 */
      .fc-theme-standard td,
      .fc-theme-standard th {
        border-color: rgba(15,23,42,.04);
      }
      .fc-theme-standard .fc-scrollgrid-section > td {
        border-bottom-color: rgba(15,23,42,.06);
      }
      /* 尽量弱化竖线，只保留极淡轮廓 */
      .fc-theme-standard .fc-scrollgrid td:not(:last-child) {
        border-right-color: transparent;
      }
      /* 星期表头：小号、加粗、次级灰 */
      .fc .fc-col-header-cell-cushion {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted-2);
        padding: 0.4rem 0;
        text-transform: none;
      }
      /* 日期数字：当前月更深，非当前月更浅 */
      .fc .fc-daygrid-day-number {
        font-size: 12px;
        font-weight: 500;
        color: #0f172a;
        padding: 0.2rem 0.3rem;
        border-radius: 999px;
      }
      .fc .fc-daygrid-day.fc-day-other .fc-daygrid-day-number {
        color: rgba(148,163,184,0.95);
      }
      /* 今天：苹果日历风格的小圆点高亮，而不是整格铺色 */
      .fc .fc-daygrid-day.fc-day-today {
        background: transparent;
      }
      .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
        background: var(--primary);
        color: #ffffff;
        border-radius: 999px;
        padding: 0.2rem 0.45rem;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.8), 0 5px 12px rgba(14,165,233,0.35);
      }

      /* Event bar makeover */
      .fc .fc-daygrid-event,
      .fc .fc-daygrid-event .fc-event-main {
        border: none !important;
      }
      .fc .fc-daygrid-event {
        padding: 2px 4px;
        cursor: pointer;
        transition: filter .12s ease, transform .05s ease;
      }
      .fc .fc-daygrid-event:hover {
        filter: brightness(0.98) saturate(1.05);
      }
      .fc .fc-daygrid-event:active {
        transform: translateY(1px);
      }
      .fc .fc-daygrid-event .fc-event-main {
        border-radius: 8px;
      }
      .fc .fc-daygrid-event .fc-event-title {
        padding: 2px 6px 2px 6px;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.25;
      }
      /* left color band */
      .fc .fc-daygrid-event::before {
        content: "";
        display: block;
        position: absolute;
        left: 3px;
        top: 4px;
        bottom: 4px;
        width: 4px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.55;
      }
      .fc .fc-daygrid-event {
        position: relative;
        padding-left: 10px; /* make room for the band */
      }

      /* pastel tag palettes */
      .fc .fc-daygrid-event.tag-long {
        background: rgba(59,130,246,.16); /* pastel blue */
        color: rgba(30,64,175,.95);
      }
      .fc .fc-daygrid-event.tag-short {
        background: rgba(34,197,94,.16); /* pastel green */
        color: rgba(20,83,45,.95);
      }
      .fc .fc-daygrid-event.tag-hw {
        background: rgba(249,115,22,.16); /* pastel orange */
        color: rgba(124,45,18,.95);
      }
      .fc .fc-daygrid-event.tag-other {
        background: rgba(14,165,233,.14);
        color: rgba(7,89,133,.95);
      }

      /* completed events look calmer */
      .fc .fc-daygrid-event.is-done {
        filter: grayscale(.15);
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen">
      <header class="app-header sticky top-0 z-10">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
          <div class="flex items-center gap-3">
            <div class="brand-dot"></div>
            <div>
              <div class="text-lg font-semibold leading-5">日历视图</div>
              <div class="text-xs muted">任务持续时间 a~b · 每天可见</div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <a href="/" class="btn btn-secondary">列表</a>
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-6xl grid-cols-1 gap-4 px-4 py-5 lg:grid-cols-[260px_1fr]">
        <aside class="card flat p-4">
          <div class="mb-3 flex items-center justify-between">
            <div class="text-sm font-semibold">筛选</div>
            <button id="btnReset" class="btn btn-ghost" style="height:28px;padding:0 .5rem;font-size:12px">重置</button>
          </div>

          <div class="grid gap-3">
            <label class="flex cursor-pointer items-center gap-2 text-sm muted">
              <input id="chkOnlyIncomplete" type="checkbox" class="h-4 w-4 accent-cyan-400" checked />
              仅看未完成
            </label>

            <div>
              <div class="text-xs muted">标签</div>
              <div id="tagList" class="mt-2 flex flex-wrap gap-2"></div>
            </div>

            <div class="info-card text-xs">
              <span class="info-icon">i</span>
              <div>
                日历会优先使用「持续时间 a~b」。如果未设置 a~b，但设置了 DDL，则会把 DDL 当作单日事件显示。
              </div>
            </div>
          </div>
        </aside>

        <section class="card flat p-3">
          <div id="calendar" class="min-h-[660px]"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/calendar.js"></script>
  </body>
</html>
