<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日历 · 本地任务看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/ui.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
      .fc {
        --fc-border-color: var(--border-2);
        --fc-page-bg-color: transparent;
        --fc-neutral-bg-color: transparent;
        --fc-today-bg-color: transparent;
        --fc-event-bg-color: #F0F4F8;
        --fc-event-border-color: rgba(234,234,234,1);
        --fc-event-text-color: var(--fg);
        --fc-button-bg-color: var(--accent);
        --fc-button-border-color: var(--border-2);
        --fc-button-text-color: var(--fg);
        --fc-button-hover-bg-color: var(--accent-2);
        --fc-button-hover-border-color: var(--border-2);
        --fc-button-active-bg-color: var(--accent-2);
        --fc-button-active-border-color: var(--border-2);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      }
      .fc .fc-button {
        border-radius: var(--radius-sm);
        box-shadow: none;
      }
      .fc .fc-toolbar-title {
        font-size: 18px;
        font-weight: 750;
        color: var(--fg);
        letter-spacing: -0.01em;
      }
      .fc .fc-header-toolbar {
        margin-bottom: 10px;
      }
      .fc .fc-toolbar-chunk:first-child {
        display:flex;
        align-items:center;
      }
      .fc .fc-toolbar-chunk:last-child {
        display:flex;
        align-items:center;
        gap: 10px;
      }
      .fc .fc-button-group {
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid var(--border-2);
        background: var(--accent);
      }
      .fc .fc-button-group .fc-button {
        border: none;
        background: transparent;
        height: 32px;
        padding: 0 10px;
        color: var(--fg);
      }
      .fc .fc-button-group .fc-button:hover {
        background: var(--accent-2);
      }
      .fc .fc-button-group .fc-button:focus {
        box-shadow: none;
      }
      .fc .fc-button-primary:not(:disabled).fc-button-active,
      .fc .fc-button-primary:not(:disabled):active {
        background: var(--accent-2);
        color: var(--fg);
      }
      .fc .fc-daygrid-event {
        border-radius: 6px;
      }
      .fc .fc-scrollgrid {
        border-radius: var(--radius);
        overflow: hidden;
      }
      .fc a {
        color: inherit;
      }
      .fc-theme-standard td,
      .fc-theme-standard th { border-color: #e5e7eb; }
      .fc-theme-standard .fc-scrollgrid-section > td {
        border-bottom-color: #e5e7eb;
      }
      .fc .fc-col-header-cell-cushion {
        font-size: 10.5px;
        font-weight: 700;
        color: #777777;
        padding: 0.4rem 0;
        text-transform: none;
      }
      .fc .fc-daygrid-day-top {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        min-height: 24px;
        gap: 4px;
      }
      .fc .fc-daygrid-day-frame {
        min-height: 118px;
      }
      .fc .fc-daygrid-day-number {
        font-size: 11px;
        font-weight: 500;
        color: var(--fg);
        width: auto;
        height: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0;
        white-space: nowrap;
        line-height: 1;
        padding: 0 .1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Fira Code","Liberation Mono","Courier New", monospace;
      }
      .fc .fc-daygrid-day.fc-day-other .fc-daygrid-day-number {
        color: var(--muted);
      }
      .fc .fc-daygrid-day.fc-day-today { background: transparent; }
      .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        padding: 0;
      }

      .fc .fc-daygrid-event,
      .fc .fc-daygrid-event .fc-event-main {
        border: none !important;
      }
      .fc .fc-daygrid-event {
        padding: 2px 5px;
        cursor: pointer;
        transition: background .16s ease, border-color .16s ease, box-shadow .16s ease, transform .1s ease;
        background: var(--event-bg, rgba(0,0,0,.03));
        color: var(--event-fg, #1f2937);
        border-radius: 3px;
        border: 1px solid var(--event-border, #dbe2ea);
        border-left: 4px solid var(--event-band, #64748B);
        margin-bottom: 2px;
        box-shadow: 0 1px 0 rgba(15,23,42,.04);
      }
      .fc .fc-daygrid-event:hover {
        background: var(--event-bg-hover, rgba(0,0,0,.06));
        border-color: var(--event-band, #64748B);
        box-shadow: 0 3px 8px rgba(15,23,42,.10);
        transform: translateY(-1px);
      }
      .fc .fc-daygrid-event:active {
        transform: translateY(0);
      }
      .fc .fc-daygrid-event .fc-event-main {
        border-radius: 3px;
      }
      .fc .fc-daygrid-event .fc-event-title {
        padding: 2px 5px;
        font-size: 11px;
        font-weight: 650;
        line-height: 1.2;
      }
      .fc .fc-daygrid-event.is-open .fc-event-title::before {
        content: "进行中 · ";
        color: rgba(30,41,59,.72);
        font-weight: 600;
      }
      .fc .fc-daygrid-event.is-done .fc-event-title::before {
        content: "已完成 · ";
        color: #64748B;
        font-weight: 600;
      }
      .fc .fc-daygrid-event::before {
        content: none;
      }
      .fc .fc-daygrid-event {
        position: relative;
        padding-left: 0;
      }
      .fc .fc-daygrid-day-events .fc-daygrid-event-harness {
        margin-bottom: 2px;
      }
      .fc .fc-daygrid-event.is-selected {
        box-shadow: inset 0 0 0 1px var(--event-band, rgba(3,102,214,.5)), 0 4px 10px rgba(15,23,42,.12);
        border-color: var(--event-band, rgba(3,102,214,.45));
      }

      .fc .fc-daygrid-event.tag-long {
        --event-band: #2563EB;
        --event-bg: #eef4ff;
        --event-bg-hover: #e3edff;
        --event-border: #c8dafd;
        --event-fg: #1e3a8a;
      }
      .fc .fc-daygrid-event.tag-short {
        --event-band: #8B5CF6;
        --event-bg: #f5f0ff;
        --event-bg-hover: #eee5ff;
        --event-border: #dccff9;
        --event-fg: #5b21b6;
      }
      .fc .fc-daygrid-event.tag-hw {
        --event-band: #F59E0B;
        --event-bg: #fff8eb;
        --event-bg-hover: #ffefcf;
        --event-border: #f7ddb0;
        --event-fg: #9a5b06;
      }
      .fc .fc-daygrid-event.tag-other {
        --event-band: #14B8A6;
        --event-bg: #ecfdf8;
        --event-bg-hover: #dbfaf2;
        --event-border: #b8eee3;
        --event-fg: #0f766e;
      }

      .fc .fc-daygrid-event.is-done {
        --event-bg: #f8fafc;
        --event-bg-hover: #f1f5f9;
        --event-border: #d9e0e8;
        --event-fg: #6b7280;
        --event-band: #94A3B8;
        filter: saturate(.5);
        opacity: 0.9;
        border-style: dashed;
        border-left-style: solid;
      }
      .fc .fc-daygrid-event.is-done .fc-event-title {
        text-decoration: line-through;
        text-decoration-thickness: 1px;
      }
      .fc .fc-list {
        border: none;
      }
      .fc .fc-list-table {
        border-collapse: separate;
        border-spacing: 0 8px;
      }
      .fc .fc-list-table td,
      .fc .fc-list-table th {
        border: none;
      }
      .fc .fc-list-day-cushion {
        background: transparent;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .01em;
        color: #6b7280;
        padding: 8px 2px 6px;
      }
      .fc .fc-list-event td {
        background: #ffffff;
        border-top: 1px solid #e6edf5;
        border-bottom: 1px solid #e6edf5;
        transition: transform .12s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
      }
      .fc .fc-list-event td:first-child {
        width: 90px;
        border-left: 1px solid #e6edf5;
        border-radius: 10px 0 0 10px;
        color: #64748b;
        font-size: 11px;
      }
      .fc .fc-list-event td:last-child {
        border-right: 1px solid #e6edf5;
        border-radius: 0 10px 10px 0;
      }
      .fc .fc-list-event:hover td {
        background: #f8fbff;
        border-color: #d7e5f8;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
        transform: translateY(-1px);
      }
      .fc .fc-list-event .fc-list-event-title a {
        font-size: 13px;
        font-weight: 620;
        color: #1f2937;
      }
      .fc .fc-list-event .fc-list-event-time {
        font-weight: 600;
      }
      .fc .fc-list-event .fc-list-event-dot {
        border-width: 4px;
      }
      .fc .fc-list-event.is-open .fc-list-event-dot {
        border-color: #2563EB;
      }
      .fc .fc-list-event.is-open .fc-list-event-title a::before {
        content: "进行中";
        display: inline-flex;
        align-items: center;
        margin-right: 8px;
        padding: 1px 6px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        color: #1e40af;
        background: #eaf1ff;
      }
      .fc .fc-list-event.is-done .fc-list-event-dot {
        border-color: #94A3B8;
      }
      .fc .fc-list-event.is-done .fc-list-event-title a {
        color: #64748b;
        text-decoration: line-through;
      }
      .fc .fc-list-event.is-done .fc-list-event-title a::before {
        content: "已完成";
        display: inline-flex;
        align-items: center;
        margin-right: 8px;
        padding: 1px 6px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        color: #475569;
        background: #eef2f7;
        text-decoration: none;
      }
      .detail-state{
        display:inline-flex;
        align-items:center;
        gap:.35rem;
        border-radius: 4px;
        border: 1px solid #d0d7de;
        padding: .1rem .4rem;
        font-size: 11px;
        font-weight: 600;
        width: fit-content;
      }
      .detail-state.is-open{
        background: #eef4ff;
        border-color: #c8dafd;
        color: #1e3a8a;
      }
      .detail-state.is-done{
        background: #f5f7fa;
        border-color: #d8dee6;
        color: #64748b;
      }
      .fc .calendar-day-cell {
        cursor: pointer;
      }
      .fc .calendar-day-cell.has-journal-entry {
        background: linear-gradient(180deg, rgba(99, 102, 241, 0.06) 0%, rgba(99, 102, 241, 0.02) 40%, rgba(255, 255, 255, 0) 100%);
      }
      .fc .calendar-day-cell.journal-level-rich {
        background: linear-gradient(180deg, rgba(79, 70, 229, 0.12) 0%, rgba(79, 70, 229, 0.06) 45%, rgba(255, 255, 255, 0) 100%);
      }
      .fc .calendar-day-cell.journal-level-regular {
        background: linear-gradient(180deg, rgba(99, 102, 241, 0.08) 0%, rgba(99, 102, 241, 0.03) 42%, rgba(255, 255, 255, 0) 100%);
      }
      .fc .calendar-day-cell.journal-level-tiny {
        background: linear-gradient(180deg, rgba(129, 140, 248, 0.06) 0%, rgba(129, 140, 248, 0.02) 38%, rgba(255, 255, 255, 0) 100%);
      }
      .fc .calendar-day-cell.has-journal-entry:not(.fc-day-today) .fc-daygrid-day-number {
        color: #4338ca;
      }
      .fc .calendar-day-cell.has-journal-entry:not(.fc-day-today) .fc-daygrid-day-number.has-journal-mark {
        font-weight: 700;
      }
      .fc .calendar-day-cell.has-journal-entry:not(.fc-day-today) .fc-daygrid-day-top::after {
        content: "记";
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 16px;
        padding: 0 5px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        color: #4338ca;
        background: rgba(99, 102, 241, 0.12);
        border: 1px solid rgba(99, 102, 241, 0.18);
        letter-spacing: .02em;
      }
      .fc .calendar-day-cell.journal-level-rich:not(.fc-day-today) .fc-daygrid-day-top::after {
        content: "记+";
        color: #312e81;
        background: rgba(79, 70, 229, 0.2);
        border-color: rgba(79, 70, 229, 0.28);
      }
      .fc .calendar-day-cell.journal-level-tiny:not(.fc-day-today) .fc-daygrid-day-top::after {
        content: "记";
        color: #4f46e5;
        background: rgba(129, 140, 248, 0.12);
        border-color: rgba(129, 140, 248, 0.2);
      }
      .fc .journal-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        display: inline-block;
        background: radial-gradient(circle at 35% 35%, #ffffff 0 24%, #6366f1 24% 100%);
        box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.24), 0 0 10px rgba(99, 102, 241, 0.36);
      }
      .fc .journal-dot.is-rich {
        width: 8px;
        height: 8px;
        background: radial-gradient(circle at 35% 35%, #ffffff 0 24%, #4338ca 24% 100%);
        box-shadow: 0 0 0 1px rgba(67, 56, 202, 0.3), 0 0 13px rgba(67, 56, 202, 0.4);
      }
      .fc .journal-dot.is-regular {
        background: radial-gradient(circle at 35% 35%, #ffffff 0 24%, #4f46e5 24% 100%);
      }
      .fc .journal-dot.is-tiny {
        width: 6px;
        height: 6px;
        background: radial-gradient(circle at 35% 35%, #ffffff 0 24%, #818cf8 24% 100%);
        box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2), 0 0 8px rgba(99, 102, 241, 0.24);
      }
      .journal-drawer-root {
        position: fixed;
        inset: 0;
        z-index: 80;
        pointer-events: none;
      }
      .journal-drawer-root.open {
        pointer-events: auto;
      }
      .journal-drawer-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.2);
        opacity: 0;
        transition: opacity .22s ease;
      }
      .journal-drawer-panel {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: min(600px, 100vw);
        background: rgba(255,255,255,.96);
        backdrop-filter: blur(8px);
        transform: translateX(100%);
        transition: transform .24s ease;
        border-left: 1px solid #e5e7eb;
        box-shadow: -12px 0 30px rgba(15, 23, 42, 0.08);
      }
      .journal-drawer-root.open .journal-drawer-backdrop {
        opacity: 1;
      }
      .journal-drawer-root.open .journal-drawer-panel {
        transform: translateX(0);
      }
      .journal-drawer-body {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        height: 100%;
        padding: 28px 28px 24px;
      }
      .journal-date-title {
        font-size: 30px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
        color: #111827;
      }
      .journal-sub-meta {
        margin-top: 4px;
        font-size: 12px;
        color: #94a3b8;
      }
      .journal-stats {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .journal-stat-chip {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        font-size: 11px;
        color: #64748b;
      }
      .journal-sync {
        border-color: #dbeafe;
        background: #eff6ff;
        color: #2563eb;
      }
      .journal-sync[data-state="editing"] {
        border-color: #e9d5ff;
        background: #faf5ff;
        color: #7e22ce;
      }
      .journal-sync[data-state="saving"] {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #1d4ed8;
      }
      .journal-sync[data-state="error"] {
        border-color: #fecaca;
        background: #fef2f2;
        color: #dc2626;
      }
      .journal-sync[data-state="synced"] {
        border-color: #d1fae5;
        background: #ecfdf5;
        color: #047857;
      }
      .journal-templates {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .journal-template-btn {
        height: 27px;
        padding: 0 9px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
        background: #fff;
        font-size: 11px;
        color: #64748b;
      }
      .journal-template-btn:hover {
        border-color: #cbd5e1;
        color: #334155;
        background: #f8fafc;
      }
      .journal-footer-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .journal-text {
        width: 100%;
        height: 100%;
        resize: none;
        border: none;
        outline: none;
        font-size: 15px;
        line-height: 1.8;
        color: #1f2937;
        background: transparent;
      }
      .journal-text::placeholder {
        color: #9ca3af;
      }
      .journal-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .journal-meta {
        font-size: 12px;
        color: #94a3b8;
      }
      @media (min-width: 1024px) {
        .detail-sticky-wrapper {
          position: sticky;
          top: 88px;
          max-height: calc(100vh - 104px);
          overflow-y: auto;
          overscroll-behavior: contain;
        }
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen">
      <header class="app-header sticky top-0 z-10">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
          <div class="flex items-center gap-3">
            <div class="brand-dot"></div>
            <div>
              <div class="text-lg font-semibold leading-5">日历视图</div>
              <div class="text-xs muted">任务持续时间 a~b · 每天可见</div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <nav class="segmented">
              <a href="/" class="seg">列表</a>
              <a href="/calendar.html" class="seg active">日历</a>
            </nav>
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-6xl grid-cols-1 gap-4 px-4 py-5 lg:grid-cols-[220px_1fr_260px]">
        <aside class="card flat p-4">
          <div class="mb-3 flex items-center justify-between">
            <div class="text-sm font-semibold">筛选</div>
            <button id="btnReset" class="btn btn-ghost" style="height:28px;padding:0 .5rem;font-size:12px">重置</button>
          </div>

          <div class="grid gap-3">
            <label class="flex cursor-pointer items-center gap-2 text-sm muted">
              <input id="chkOnlyIncomplete" type="checkbox" class="h-4 w-4 accent-cyan-400" checked />
              仅看未完成
            </label>

            <div>
              <div class="text-xs muted">标签</div>
              <div id="tagList" class="mt-2 flex flex-wrap gap-2"></div>
            </div>

            <div class="info-card text-xs">
              <span class="info-icon">i</span>
              <div>
                日历会优先使用「持续时间 a~b」。如果未设置 a~b，但设置了 DDL，则会把 DDL 当作单日事件显示。
              </div>
            </div>
          </div>
        </aside>

        <section class="card flat p-3">
          <div id="calendar" class="min-h-[760px]"></div>
        </section>

        <aside class="right-column-grid-item">
          <div class="card flat p-4 detail-sticky-wrapper">
            <div class="mb-3 text-sm font-semibold">任务详情</div>
            <div id="taskDetailEmpty" class="text-xs muted">点击日历中的任务，在这里查看详细信息。</div>
            <div id="taskDetail" class="hidden grid gap-3">
              <div>
                <div class="text-xs muted">标题</div>
                <div id="detailTitle" class="mt-1 text-sm font-semibold"></div>
              </div>
              <div>
                <div class="text-xs muted">目标</div>
                <div id="detailGoal" class="mt-1 text-xs leading-6"></div>
              </div>
              <div class="grid grid-cols-2 gap-2">
                <div>
                  <div class="text-xs muted">状态</div>
                  <div id="detailState" class="detail-state mt-1 text-xs font-medium"></div>
                </div>
                <div>
                  <div class="text-xs muted">标签</div>
                  <div id="detailTags" class="mt-1 text-xs"></div>
                </div>
              </div>
              <button id="btnDetailToggleComplete" class="btn btn-primary w-full">
                完成任务
              </button>
              <div class="grid grid-cols-2 gap-2">
                <div>
                  <div class="text-xs muted">DDL</div>
                  <div id="detailDue" class="mt-1 text-xs log-meta"></div>
                </div>
                <div>
                  <div class="text-xs muted">持续时间</div>
                  <div id="detailRange" class="mt-1 text-xs log-meta"></div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </main>

      <div id="journalDrawer" class="journal-drawer-root" aria-hidden="true">
        <div id="journalDrawerBackdrop" class="journal-drawer-backdrop"></div>
        <aside id="journalDrawerPanel" class="journal-drawer-panel" role="dialog" aria-modal="true" aria-label="每日日记抽屉">
          <div class="journal-drawer-body">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div id="journalDateTitle" class="journal-date-title">—</div>
                <div id="journalSubMeta" class="journal-sub-meta"></div>
                <div class="journal-stats">
                  <span id="journalStatChars" class="journal-stat-chip">字数 0</span>
                  <span id="journalStatWords" class="journal-stat-chip">词数 0</span>
                  <span id="journalSyncState" class="journal-stat-chip journal-sync" data-state="loading">加载中</span>
                </div>
                <div class="journal-templates">
                  <button id="btnTplSummary" class="journal-template-btn" type="button">+ 今日总结</button>
                  <button id="btnTplPlan" class="journal-template-btn" type="button">+ 明日计划</button>
                  <button id="btnTplReflect" class="journal-template-btn" type="button">+ 复盘反思</button>
                </div>
              </div>
              <button id="btnDrawerClose" class="btn btn-ghost" style="height:30px;padding:0 .65rem;font-size:12px">关闭</button>
            </div>
            <textarea id="journalText" class="journal-text" placeholder="今天发生了什么？"></textarea>
            <div class="journal-footer">
              <div id="journalMeta" class="journal-meta">还没有记录，写点什么吧。</div>
              <div class="journal-footer-actions">
                <button id="btnJournalClear" class="btn btn-ghost" style="height:34px;padding:0 .9rem;font-size:12px">清空</button>
                <button id="btnJournalSave" class="btn btn-primary" style="height:34px;padding:0 .95rem;font-size:12px">保存</button>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="/calendar.js"></script>
  </body>
</html>
